apiVersion: v1
kind: Service
metadata:
  labels:
    app: rook-ceph-mgr
    rook_cluster: rook-ceph
  name: rook-ceph-mgr-dashboard-np
  namespace: rook-ceph
spec:
  ports:
    - name: http-dashboard
      port: 7000
      protocol: TCP
      targetPort: 7000
      nodePort: 30070  # 这里指定你想用的端口，比如 30080
  selector:
    app: rook-ceph-mgr
    mgr_role: active
    rook_cluster: rook-ceph
  type: NodePort
