apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: ovn-ceph-cluster-net
spec:
  protocol: IPv4
  provider: ovn-ceph-cluster-net.rook-ceph
  cidrBlock: 10.10.30.0/24
  gateway: 10.10.30.1  # IP address of the physical gateway
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovn-ceph-cluster-net
  namespace: rook-ceph
spec:
  config: '{
      "cniVersion": "0.3.0",
      "type": "macvlan",
      "master": "ens20",
      "mode": "bridge",
      "ipam": {
        "type": "kube-ovn",
        "server_socket": "/run/openvswitch/kube-ovn-daemon.sock",
        "provider": "ovn-ceph-cluster-net.rook-ceph"
      }
    }'
