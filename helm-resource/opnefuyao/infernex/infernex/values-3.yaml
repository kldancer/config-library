istio-istiod:
  pilot:
    env:
      ENABLE_GATEWAY_API_INFERENCE_EXTENSION: "true"
inferenceGateway:
  name: "inference-gateway"
  className: "istio"
  annotations:
    networking.istio.io/service-type: "NodePort"
  listeners:
    - name: http
      port: 80
      protocol: HTTP
global:
  name: vllm-qwen-qwen2-5-7b
  namespace: "ai-inference"
  image:
    repository: cr.openfuyao.cn/openfuyao/vllm-ascend
    pullPolicy: Always
    tag: "0.11.0-rc3.of.1"
  env:
    - name: VLLM_USE_V1
      value: "1"
  cachePath: "/home/llm_cache"
hermes-router:
  inferencepool:
    inferenceExtension:
      replicas: 1
      image:
        name: hermes-router
        hub: cr.openfuyao.cn/openfuyao
        tag: 0.20.1
        pullPolicy: IfNotPresent
      extProcPort: 9002
      pluginsConfigFile: "epp-aggregate-kv-cache-aware.yaml"
      pluginsCustomConfig:
        epp-aggregate-kv-cache-aware.yaml: |
          apiVersion: inference.networking.x-k8s.io/v1alpha1
          kind: EndpointPickerConfig
          plugins:
          - type: scorer-aggregate-kv-cache-aware
            parameters:
              kvCacheHitNotRateWeight: 1.0
              xpuCacheUsageWeight: 1.0
              waitingRequestWeight: 1.0
              kvCacheManagerIP: cache-indexer-service
              kvCacheManagerPort: 8080
              kvCacheManagerPath: /match_sort
              kvCacheManagerTimeout: 10
          - type: picker-min-random
          schedulingProfiles:
          - name: default
            plugins:
            - pluginRef: scorer-aggregate-kv-cache-aware
            - pluginRef: picker-min-random
      flags:
        v: 4
        refresh-metrics-interval: "1s"
      affinity: {}
    inferencePool:
      targetPorts:
        - number: 8000
      modelServerType: vllm # vllm, triton-tensorrt-llm
      apiVersion: inference.networking.k8s.io/v1
      modelServers: # REQUIRED
        matchLabels:
          openfuyao.com/model: qwen-qwen2.5-7b
    provider:
      name: istio
      istio:
        destinationRule:
          host: ""
          trafficPolicy:
            tls:
              mode: SIMPLE
              insecureSkipVerify: true
  httpRoute:
    parentRef:
      group: "gateway.networking.k8s.io"
      kind: "Gateway"
      name: "inference-gateway"
    backend:
      group: "inference.networking.k8s.io"
      kind: "InferencePool"
      name: "vllm-qwen-qwen2-5-7b"
    pathPrefix: "/"
    requestTimeout: "300s"
inference-backend:
  services:
    - name: vllm-pd-2p1d
      enabled: false
      mode: pd
      service:
        type: ClusterIP
        port: 8000
      model:
        name: "Qwen/Qwen2.5-7B"
      openfuyao:
        model: "Qwen/Qwen2.5-7B"
        engine: vllm
        pdGroupID: "qwen2.5-7b-pd-01"
      pd:
        kvTransferConfig:
          kv_connector: "MooncakeConnectorV1"
          kv_connector_module_path: "vllm_ascend.distributed.mooncake_connector"
          kv_buffer_device: "npu"
          kv_parallel_size: 1
        prefill:
          replicaAmount: 1
          port: 8000
          enablePrefixCaching: true
          tensorParallelSize: 2
          dataParallelSize: 1
          maxModelLen: 10000
          maxNumBatchedTokens: 40960
          dataParallelRpcPort: 9100
          gpuMemoryUtilization: 0.8
          blockSize: 128
          batchRequest: true
          connectorBasePort: 20001
        decode:
          replicaAmount: 1
          port: 8000
          enablePrefixCaching: false
          tensorParallelSize: 1
          dataParallelSize: 1
          maxModelLen: 10000
          maxNumBatchedTokens: 40960
          dataParallelRpcPort: 9100
          gpuMemoryUtilization: 0.8
          connectorBasePort: 20002
        proxyServer:
          port: 8000
          discoveryInterval: 10
          serviceAccountName: vllm-proxy-sa
      resources:
        requests:
          cpu: "8"
          memory: "32Gi"
        limits:
          cpu: "16"
          memory: "64Gi"
      env:
        - name: OMP_PROC_BIND
          value: "false"
        - name: OMP_NUM_THREADS
          value: "10"
        - name: HCCL_BUFFSIZE
          value: "512"
        - name: TASK_QUEUE_ENABLE
          value: "1"
        - name: HCCL_OP_EXPANSION_MODE
          value: "AIV"
        - name: VLLM_ASCEND_ENABLE_DENSE_OPTIMIZE
          value: "1"
    - name: vllm-aggregated-tp2
      enabled: true
      mode: aggregated
      replicas: 1
      model:
        name: "Qwen/Qwen2.5-7B"
      service:
        type: ClusterIP
        port: 8000
      openfuyao:
        model: "Qwen/Qwen2.5-7B"
        engine: vllm
        pdRole: aggregated
      aggregated:
        enablePrefixCaching: true
        port: 8000
        tensorParallelSize: 2
        dataParallelSize: 1
        gpuMemoryUtilization: 0.8
        blockSize: 128
        maxModelLen: 10000
        maxNumBatchedTokens: 40960
      resources:
        requests:
          cpu: "8"
          memory: "32Gi"
        limits:
          cpu: "16"
          memory: "64Gi"
      env:
        - name: OMP_PROC_BIND
          value: "false"
        - name: OMP_NUM_THREADS
          value: "10"
        - name: HCCL_BUFFSIZE
          value: "512"
# cache indexer
cache-indexer:
  app:
    useOnlineHuggingFace: false
    cachePath: /home/llm_cache
    serviceDiscovery:
      labelSelector: "inference-backend=true,openfuyao.com/engine=vllm"
      refreshInterval: 10
  service:
    name: cache-indexer-service
    port: 8080
  image:
    repository: cr.openfuyao.cn/openfuyao/cache-indexer
    tag: "0.20.1"
    pullPolicy: IfNotPresent
hardware-monitor-diagnosis:
  enabled: true
hardware-monitor:
  images:
    core:
      repository: cr.openfuyao.cn/openfuyao/eagle-eye-hardware-monitor
      tag: "0.21.1"
      pullPolicy: Always
hardware-diagnosis:
  images:
    core:
      repository: cr.openfuyao.cn/openfuyao/eagle-eye-hardware-diagnosis
      tag: "0.21.1"
      pullPolicy: Always
kube-prometheus-stack:
  enabled: false
