{{- if .Values.inferencepool }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name | default (printf "%s-httproute" (.Values.global.name | default .Release.Name)) }}
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
spec:
  parentRefs:
  - group: {{ .Values.httpRoute.parentRef.group | default "gateway.networking.k8s.io" }}
    kind: {{ .Values.httpRoute.parentRef.kind | default "Gateway" }}
    name: {{ .Values.httpRoute.parentRef.name | default "inference-gateway" }}
  rules:
  - backendRefs:
    - group: {{ .Values.httpRoute.backend.group | default "inference.networking.k8s.io" }}
      kind: {{ .Values.httpRoute.backend.kind | default "InferencePool" }}
      name: {{ .Values.httpRoute.backend.name | default (include "gaie.inferencePoolName" .) }}
    matches:
    - path:
        type: PathPrefix
        value: {{ .Values.httpRoute.pathPrefix | default "/" | quote }}
    {{- if .Values.httpRoute.requestTimeout }}
    timeouts:
      request: {{ .Values.httpRoute.requestTimeout }}
    {{- end }}
{{- end }}
