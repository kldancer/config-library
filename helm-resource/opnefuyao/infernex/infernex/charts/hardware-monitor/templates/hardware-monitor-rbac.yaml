apiVersion: v1
kind: ServiceAccount
metadata:
  name: hardware-monitor-serviceaccount
  namespace: eagle-eye
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hardware-monitor-clusterrole
  namespace: eagle-eye
rules:
  - apiGroups: [""]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hardware-monitor-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: hardware-monitor-serviceaccount
    namespace: eagle-eye
roleRef:
  kind: ClusterRole
  name: hardware-monitor-clusterrole
  apiGroup: rbac.authorization.k8s.io