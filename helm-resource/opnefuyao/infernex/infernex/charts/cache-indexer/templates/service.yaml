apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
  labels:
    app: cache
spec:
  type: ClusterIP  
  selector:
    app: cache
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http